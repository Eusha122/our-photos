name: memoryvault
description: A local-first, cloud-optional premium gallery app.
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ">=3.4.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.5.1
  go_router: ^14.2.0
  drift: ^2.18.0
  drift_flutter: ^0.1.0
  sqlite3_flutter_libs: ^0.5.24
  path_provider: ^2.1.3
  path: ^1.9.0
  photo_manager: ^3.2.0
  permission_handler: ^11.3.1
  cached_memory_image: ^1.5.0
  blurhash_dart: ^1.2.1
  crypto: ^3.0.3
  http: ^1.2.1
  flutter_secure_storage: ^9.2.2
  workmanager: ^0.5.2
  share_plus: ^9.0.0
  local_auth: ^2.2.0
  video_player: ^2.9.1
  photo_view: ^0.15.0
  exif: ^3.3.0
  geolocator: ^12.0.0
  tflite_flutter: ^0.11.0
  google_mlkit_face_detection: ^0.12.0
  google_mlkit_text_recognition: ^0.13.0
  ffmpeg_kit_flutter_new_min: ^1.1.0
  collection: ^1.18.0
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.11
  drift_dev: ^2.18.0
  mocktail: ^1.0.4

flutter:
  uses-material-design: true
  assets:
    - assets/place_data/
    - assets/ml/
